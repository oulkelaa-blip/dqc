schemaVersion: 2.2.2
metadata:
  name: dqc

attributes:
  controller.devfile.io/storage-type: per-workspace

components:
  - name: runtime
    container:
      image: registry.redhat.io/devspaces/udi-rhel9:latest
      mountSources: true
      memoryRequest: 1Gi
      memoryLimit: 2Gi
      cpuRequest: "100m"
      cpuLimit: "500m"
      env:
        - name: DQC_DEVFILE_ACTIVE
          value: "YES"
        - name: NODE_ENV
          value: development
        - name: CHOKIDAR_USEPOLLING
          value: "true"
        - name: CHOKIDAR_INTERVAL
          value: "1500"
        - name: WATCHPACK_POLLING
          value: "true"
      endpoints:
        - name: front
          exposure: public
          protocol: https
          targetPort: 4200
        - name: back
          exposure: public
          protocol: https
          targetPort: 5000

  - name: npm-cache
    volume:
      size: 2Gi

commands:
  - id: install-all
    exec:
      label: Install all dependencies
      component: runtime
      workingDir: /projects/dqc
      commandLine: |
        set -e
        npm install
        cd /projects/dqc/front-ng
        npm install

  - id: start-back
    exec:
      label: Start backend
      component: runtime
      workingDir: /projects/dqc
      commandLine: |
        mkdir -p /tmp/dqc
        pkill -f "node back/server.js" || true
        nohup node back/server.js > /tmp/dqc/back.log 2>&1 &

  - id: start-front
    exec:
      label: Start frontend
      component: runtime
      workingDir: /projects/dqc/front-ng
      commandLine: |
        mkdir -p /tmp/dqc
        pkill -f "ng serve" || true
        nohup npm start > /tmp/dqc/front.log 2>&1 &

events:
  postStart:
    - start-back
    - start-front
