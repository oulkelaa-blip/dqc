schemaVersion: 2.2.2
metadata:
  name: dqc

attributes:
  controller.devfile.io/storage-type: per-workspace

components:
  - name: runtime
    container:
      image: registry.redhat.io/devspaces/udi-rhel9:latest
      mountSources: true

      memoryRequest: 1Gi
      memoryLimit: 2Gi
      cpuRequest: "100m"
      cpuLimit: "500m"

      env:
        - name: NODE_ENV
          value: development
        - name: CHOKIDAR_USEPOLLING
          value: "true"
        - name: WATCHPACK_POLLING
          value: "true"
        - name: NODE_OPTIONS
          value: "--max-old-space-size=1536"

      endpoints:
        - name: front
          exposure: public
          protocol: https
          targetPort: 4200

        - name: back
          exposure: public
          protocol: https
          targetPort: 5000

      volumeMounts:
        - name: npm-cache
          path: /home/user/.npm

  - name: npm-cache
    volume:
      size: 2Gi

# =========================
# COMMANDES
# =========================

commands:

  - id: install-all
    exec:
      label: Install dependencies
      component: runtime
      workingDir: /projects/dqc
      commandLine: |
        set -e
        echo "Installing backend..."
        npm install

        echo "Installing frontend..."
        cd front-ng
        npm install

        echo "Done."

  - id: start-back
    exec:
      label: Start backend (npm start)
      component: runtime
      workingDir: /projects/dqc
      commandLine: |
        mkdir -p /tmp/dqc
        pkill -f "node" || true
        nohup npm start > /tmp/dqc/back.log 2>&1 &

  - id: start-front
    exec:
      label: Start frontend (Angular)
      component: runtime
      workingDir: /projects/dqc/front-ng
      commandLine: |
        mkdir -p /tmp/dqc
        pkill -f "ng serve" || true
        nohup npm start > /tmp/dqc/front.log 2>&1 &

  - id: logs
    exec:
      label: Show logs
      component: runtime
      workingDir: /projects/dqc
      commandLine: |
        tail -f /tmp/dqc/back.log /tmp/dqc/front.log

# =========================
# AUTO START
# =========================

events:
  postStart:
    - start-back
    - start-front
