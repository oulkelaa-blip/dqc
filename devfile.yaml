schemaVersion: 2.2.2
metadata:
  name: dqc

attributes:
  controller.devfile.io/storage-type: per-workspace

components:
  - name: runtime
    container:
      image: registry.redhat.io/devspaces/udi-rhel9:latest
      mountSources: true

      memoryRequest: 1Gi
      memoryLimit: 2Gi
      cpuRequest: "100m"
      cpuLimit: "500m"

      env:
        - name: DQC_DEVFILE_ACTIVE
          value: "YES"
        - name: NODE_ENV
          value: development
        - name: CHOKIDAR_USEPOLLING
          value: "true"
        - name: CHOKIDAR_INTERVAL
          value: "1500"
        - name: WATCHPACK_POLLING
          value: "true"
        - name: NG_CLI_ANALYTICS
          value: "false"
        - name: NPM_CONFIG_FUND
          value: "false"
        - name: NPM_CONFIG_AUDIT
          value: "false"
        - name: NODE_OPTIONS
          value: "--max-old-space-size=1536"

      endpoints:
        - name: front
          exposure: public
          protocol: https
          targetPort: 4200

        - name: back
          exposure: public
          protocol: https
          targetPort: 5000

        - name: back-debug
          exposure: internal
          protocol: tcp
          targetPort: 9229

      volumeMounts:
        - name: npm-cache
          path: /home/user/.npm
        - name: user-cache
          path: /home/user/.cache

  - name: npm-cache
    volume:
      size: 2Gi

  - name: user-cache
    volume:
      size: 1Gi

commands:
  - id: check-env
    exec:
      label: Check environment
      component: runtime
      workingDir: /projects
      commandLine: |
        echo "Node: $(node -v)"
        echo "NPM : $(npm -v)"
        echo "PWD : $(pwd)"
        echo "Projects:"
        ls -la /projects
      group:
        kind: build

  - id: install-root
    exec:
      label: Install root dependencies
      component: runtime
      workingDir: /projects/dqc
      commandLine: |
        echo "Installing root dependencies..."
        npm install
      group:
        kind: build

  - id: install-front
    exec:
      label: Install front dependencies
      component: runtime
      workingDir: /projects/dqc/front-ng
      commandLine: |
        echo "Installing front-ng dependencies..."
        npm install
      group:
        kind: build

  - id: install-all
    exec:
      label: Install all dependencies
      component: runtime
      workingDir: /projects/dqc
      commandLine: |
        set -e
        echo "=== Install root dependencies ==="
        npm install

        echo "=== Install front-ng dependencies ==="
        cd /projects/dqc/front-ng
        npm install

        echo "=== Install completed ==="
      group:
        kind: build
        isDefault: true

  - id: run-back
    exec:
      label: Run backend
      component: runtime
      workingDir: /projects/dqc
      commandLine: |
        echo "Starting backend on port 5000..."
        node back/server.js
      group:
        kind: run

  - id: run-front
    exec:
      label: Run frontend
      component: runtime
      workingDir: /projects/dqc/front-ng
      commandLine: |
        echo "Starting frontend on port 4200..."
        npm start
      group:
        kind: run

  - id: start-all
    exec:
      label: Start DQC
      component: runtime
      workingDir: /projects/dqc
      commandLine: |
        echo "=== Starting DQC stack ==="

        echo "[1/2] Starting backend..."
        sh -c 'cd /projects/dqc && node back/server.js' > /tmp/dqc-back.log 2>&1 &
        BACK_PID=$!
        echo $BACK_PID > /tmp/dqc-back.pid
        echo "Backend PID: $BACK_PID"

        echo "[2/2] Starting frontend..."
        sh -c 'cd /projects/dqc/front-ng && npm start' > /tmp/dqc-front.log 2>&1 &
        FRONT_PID=$!
        echo $FRONT_PID > /tmp/dqc-front.pid
        echo "Frontend PID: $FRONT_PID"

        echo "=== DQC started ==="
        echo "Back log : /tmp/dqc-back.log"
        echo "Front log: /tmp/dqc-front.log"
      group:
        kind: run

  - id: logs
    exec:
      label: Show logs
      component: runtime
      workingDir: /projects/dqc
      commandLine: |
        touch /tmp/dqc-back.log /tmp/dqc-front.log
        echo "=== BACKEND LOG ==="
        tail -n 100 /tmp/dqc-back.log &
        T1=$!
        echo "=== FRONTEND LOG ==="
        tail -n 100 /tmp/dqc-front.log &
        T2=$!
        wait $T1 $T2
      group:
        kind: run

  - id: debug-back
    exec:
      label: Debug backend
      component: runtime
      workingDir: /projects/dqc
      commandLine: |
        node --inspect=0.0.0.0:9229 back/server.js
      group:
        kind: debug
        isDefault: true

  - id: stop-all
    exec:
      label: Stop DQC
      component: runtime
      workingDir: /projects/dqc
      commandLine: |
        echo "Stopping DQC processes..."

        if [ -f /tmp/dqc-back.pid ]; then
          kill -15 $(cat /tmp/dqc-back.pid) 2>/dev/null || true
          rm -f /tmp/dqc-back.pid
        fi

        if [ -f /tmp/dqc-front.pid ]; then
          kill -15 $(cat /tmp/dqc-front.pid) 2>/dev/null || true
          rm -f /tmp/dqc-front.pid
        fi

        pkill -f "node back/server.js" 2>/dev/null || true
        pkill -f "ng serve" 2>/dev/null || true

        echo "DQC stopped."
      group:
        kind: run
