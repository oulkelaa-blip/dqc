schemaVersion: 2.2.2
metadata:
  name: dqc-workspace

components:
  - name: dqc-tools
    container:
      image: quay.io/devfile/universal-developer-image:nodejs18-latest
      mountSources: true
      memoryRequest: 1Gi
      memoryLimit: 2Gi
      cpuRequest: "100m"
      cpuLimit: "500m"
      env:
        - name: DQC_DEVFILE_ACTIVE
          value: "YES"
      endpoints:
        - name: dqc-front
          exposure: public
          protocol: https
          targetPort: 4200
        - name: dqc-back
          exposure: public
          protocol: https
          targetPort: 5000
