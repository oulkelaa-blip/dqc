schemaVersion: 2.2.2
metadata:
  name: dqc-workspace

attributes:
  controller.devfile.io/storage-type: per-workspace

components:
  - name: dqc-tools
    container:
      image: quay.io/devfile/universal-developer-image:nodejs18-latest
      mountSources: true

      memoryRequest: 2Gi
      memoryLimit: 7Gi
      cpuRequest: "500m"
      cpuLimit: "1000m"

      env:
        - name: NODE_ENV
          value: development
        - name: CHOKIDAR_USEPOLLING
          value: "true"
        - name: CHOKIDAR_INTERVAL
          value: "1500"
        - name: WATCHPACK_POLLING
          value: "true"
        - name: NG_CLI_ANALYTICS
          value: "false"
        - name: NPM_CONFIG_FUND
          value: "false"
        - name: NPM_CONFIG_AUDIT
          value: "false"
        - name: NODE_OPTIONS
          value: "--max-old-space-size=6144"

      endpoints:
        - name: dqc-front
          exposure: public
          protocol: https
          targetPort: 4200

        - name: dqc-back
          exposure: public
          protocol: https
          targetPort: 5000

        - name: dqc-back-debug
          exposure: internal
          protocol: tcp
          targetPort: 9229

      volumeMounts:
        - name: npm-cache
          path: /home/user/.npm
        - name: node-cache
          path: /home/user/.cache

  - name: npm-cache
    volume:
      size: 2Gi

  - name: node-cache
    volume:
      size: 1Gi

commands:
  - id: dqc:check-node
    exec:
      label: DQC - Check Node/NPM versions
      component: dqc-tools
      workingDir: /projects/dqc
      commandLine: |
        echo "Node: $(node -v)"
        echo "NPM : $(npm -v)"
      group:
        kind: build

  - id: dqc:install:front
    exec:
      label: DQC - Install frontend dependencies
      component: dqc-tools
      workingDir: /projects/dqc/front-ng
      commandLine: npm install
      group:
        kind: build
        isDefault: true

  - id: dqc:run:back
    exec:
      label: DQC - Run backend
      component: dqc-tools
      workingDir: /projects/dqc
      commandLine: |
        echo "=== Starting backend with node back/server.js ==="
        node back/server.js
      group:
        kind: run

  - id: dqc:run:front
    exec:
      label: DQC - Run frontend
      component: dqc-tools
      workingDir: /projects/dqc/front-ng
      commandLine: |
        echo "=== Starting Angular on port 4200 ==="
        npm start -- --host 0.0.0.0 --port 4200 --poll 1500
      group:
        kind: run

  - id: dqc:start
    exec:
      label: DQC - Start backend and frontend
      component: dqc-tools
      workingDir: /projects/dqc
      commandLine: |
        echo "=== Starting DQC full stack ==="

        echo "[1/2] Starting backend..."
        sh -c 'cd /projects/dqc && node back/server.js' > /tmp/dqc-back.log 2>&1 &
        BACK_PID=$!
        echo $BACK_PID > /tmp/dqc-back.pid
        echo "Backend PID: $BACK_PID"

        echo "[2/2] Starting frontend..."
        sh -c 'cd /projects/dqc/front-ng && npm start -- --host 0.0.0.0 --port 4200 --poll 1500' > /tmp/dqc-front.log 2>&1 &
        FRONT_PID=$!
        echo $FRONT_PID > /tmp/dqc-front.pid
        echo "Frontend PID: $FRONT_PID"

        echo "=== DQC started ==="
        echo "Frontend log: /tmp/dqc-front.log"
        echo "Backend log : /tmp/dqc-back.log"
      group:
        kind: run

  - id: dqc:logs
    exec:
      label: DQC - Tail logs
      component: dqc-tools
      workingDir: /projects/dqc
      commandLine: |
        touch /tmp/dqc-back.log /tmp/dqc-front.log
        echo "=== BACKEND LOG ==="
        tail -n 80 /tmp/dqc-back.log &
        T1=$!
        echo "=== FRONTEND LOG ==="
        tail -n 80 /tmp/dqc-front.log &
        T2=$!
        wait $T1 $T2
      group:
        kind: run

  - id: dqc:debug:back
    exec:
      label: DQC - Debug backend
      component: dqc-tools
      workingDir: /projects/dqc
      commandLine: |
        node --inspect=0.0.0.0:9229 back/server.js
      group:
        kind: debug
        isDefault: true

  - id: dqc:stop
    exec:
      label: DQC - Stop backend and frontend
      component: dqc-tools
      workingDir: /projects/dqc
      commandLine: |
        echo "=== Stopping DQC processes ==="

        if [ -f /tmp/dqc-back.pid ]; then
          kill -15 $(cat /tmp/dqc-back.pid) 2>/dev/null || true
          rm -f /tmp/dqc-back.pid
        fi

        if [ -f /tmp/dqc-front.pid ]; then
          kill -15 $(cat /tmp/dqc-front.pid) 2>/dev/null || true
          rm -f /tmp/dqc-front.pid
        fi

        pkill -f "node back/server.js" 2>/dev/null || true
        pkill -f "ng serve" 2>/dev/null || true
        pkill -f "node --inspect=0.0.0.0:9229 back/server.js" 2>/dev/null || true

        echo "=== DQC stopped ==="
      group:
        kind: run
